<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>BTC500</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap');

  :root{
    --paper:#FCFBF9;
    --ink:#17140F;
    --orange:#F0611A;
    --orange-soft:#F0611A1F;
    --line:#EAE6DC;
    --muted:#8B857A;
  }

  *{box-sizing:border-box; margin:0; padding:0;}

  html,body{
    background:var(--paper);
    color:var(--ink);
    width:100%;
    min-height:100vh;
    font-family:'Space Grotesk', sans-serif;
  }

  .stage{
    position:relative;
    width:100%;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:7vh 5vw 5vh;
  }

  .badge{
    display:inline-flex;
    align-items:center;
    gap:8px;
    padding:7px 16px;
    border:1px solid var(--line);
    border-radius:999px;
    font-family:'IBM Plex Mono', monospace;
    font-size:11px;
    letter-spacing:0.22em;
    text-transform:uppercase;
    color:var(--muted);
    margin-bottom:5vh;
  }
  .badge .sq{
    width:6px; height:6px; background:var(--orange); border-radius:1px;
  }

  .chart-wrap{
    position:relative;
    width:min(84vw, 900px);
    margin-bottom:6vh;
  }

  svg{ width:100%; height:auto; display:block; overflow:visible; }

  .grid-line{
    stroke:var(--line);
    stroke-width:1;
  }

  .price-line{
    fill:none;
    stroke:var(--orange);
    stroke-width:3;
    stroke-linecap:round;
    stroke-linejoin:round;
  }
  .price-fill{
    fill:url(#fadeGrad);
  }

  .halving-rule{
    stroke:#C9C3B6;
    stroke-width:1.5;
    stroke-dasharray:2 5;
  }

  .halving-label{
    font-family:'IBM Plex Mono', monospace;
    font-weight:600;
    font-size:12px;
    letter-spacing:0.18em;
    fill:#B3ABA0;
    text-transform:uppercase;
  }

  .zone-ring{
    fill:none;
    stroke:var(--orange);
    stroke-width:2.5;
  }
  .zone-fill{
    fill:var(--orange-soft);
  }
  .zone-label{
    font-family:'Space Grotesk', sans-serif;
    font-weight:700;
    font-size:19px;
    fill:var(--ink);
  }
  .day-label{
    font-family:'IBM Plex Mono', monospace;
    font-weight:600;
    font-size:11px;
    fill:var(--orange);
    letter-spacing:0.05em;
  }

  .callout-line{
    stroke:#D8D2C4;
    stroke-width:1.25;
  }

  h1{
    font-size:clamp(42px, 6.4vw, 72px);
    font-weight:700;
    letter-spacing:-0.03em;
    line-height:1;
    text-align:center;
  }
  h1 span{ color:var(--orange); }

  .sub{
    margin-top:20px;
    max-width:440px;
    text-align:center;
    font-family:'IBM Plex Mono', monospace;
    font-size:13px;
    line-height:1.85;
    color:#655F53;
  }
  .sub b{ color:var(--ink); font-weight:600; }

  .foot{
    margin-top:auto;
    padding-top:6vh;
    font-family:'IBM Plex Mono', monospace;
    font-size:11px;
    letter-spacing:0.18em;
    color:#C4BEB0;
    text-transform:uppercase;
  }
</style>
</head>
<body>
<div class="stage">

  <div class="badge"><span class="sq"></span>One rule · every halving cycle</div>

  <div class="chart-wrap">
    <svg viewBox="0 0 900 460">
      <defs>
        <linearGradient id="fadeGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#F0611A" stop-opacity="0.14"/>
          <stop offset="100%" stop-color="#F0611A" stop-opacity="0"/>
        </linearGradient>
      </defs>

      <!-- subtle horizontal grid -->
      <line class="grid-line" x1="0" y1="100" x2="900" y2="100"/>
      <line class="grid-line" x1="0" y1="220" x2="900" y2="220"/>
      <line class="grid-line" x1="0" y1="340" x2="900" y2="340"/>

      <!-- realistic-ish BTC path: accumulation, choppy climb into halving, volatile rally, blow-off top, decline -->
      <path class="price-fill" d="
        M 10 380
        L 40 392 L 70 400 L 100 388 L 130 397 L 160 378
        L 190 360 L 220 368 L 250 340 L 280 322 L 310 332
        L 340 300 L 370 278 L 400 286 L 430 250
        L 460 200 L 490 215 L 520 165 L 550 178 L 580 120
        L 610 95 L 640 108 L 670 60 L 700 80 L 730 105
        L 760 150 L 790 175 L 820 210 L 850 235 L 890 260
        L 890 460 L 10 460 Z"/>

      <path class="price-line" d="
        M 10 380
        L 40 392 L 70 400 L 100 388 L 130 397 L 160 378
        L 190 360 L 220 368 L 250 340 L 280 322 L 310 332
        L 340 300 L 370 278 L 400 286 L 430 250
        L 460 200 L 490 215 L 520 165 L 550 178 L 580 120
        L 610 95 L 640 108 L 670 60 L 700 80 L 730 105
        L 760 150 L 790 175 L 820 210 L 850 235 L 890 260
      "/>

      <!-- halving vertical rule -->
      <line class="halving-rule" x1="460" y1="30" x2="460" y2="430"/>
      <text class="halving-label" x="460" y="20" text-anchor="middle">Halving</text>

      <!-- BUY callout: point on curve ~310,332 -->
      <circle cx="310" cy="332" r="4" fill="var(--orange)"/>
      <line class="callout-line" x1="310" y1="332" x2="310" y2="378"/>
      <circle class="zone-fill" cx="310" cy="415" r="38"/>
      <circle class="zone-ring" cx="310" cy="415" r="38"/>
      <text class="zone-label" x="310" y="408" text-anchor="middle">Buy</text>
      <text class="day-label" x="310" y="426" text-anchor="middle">−500d</text>

      <!-- SELL callout: point on curve ~670,60 -->
      <circle cx="670" cy="60" r="4" fill="var(--orange)"/>
      <line class="callout-line" x1="670" y1="60" x2="670" y2="24"/>

      <!-- sell circle positioned above-right of the peak, clear of the halving label -->
      <circle class="zone-fill" cx="740" cy="55" r="38"/>
      <circle class="zone-ring" cx="740" cy="55" r="38"/>
      <line class="callout-line" x1="670" y1="60" x2="712" y2="56"/>
      <text class="zone-label" x="740" y="48" text-anchor="middle">Sell</text>
      <text class="day-label" x="740" y="66" text-anchor="middle">+500d</text>

    </svg>
  </div>

  <h1>BTC<span>500</span></h1>
  <p class="sub">
    <b>Buy 500 days before the halving.</b><br>
    <b>Sell 500 days after.</b>
  </p>

  <div class="foot">btc500.vercel.app</div>
</div>

</body>
</html>
